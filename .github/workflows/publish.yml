name: publish

on:
  push:
    branches: ['main']
    tags:
      - 'v*.*.*'

concurrency: ${{ github.ref }}

env:
  APPLICATION_NAME: 'adder'

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      RELEASE_ID: ${{ steps.create-release.outputs.result }}
    steps:
      - run: "echo \"RELEASE_TAG=${GITHUB_REF#refs/tags/}\" >> $GITHUB_ENV"
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0 https://github.com/actions/github-script/releases/tag/v9.0.0
        id: create-release
        if: startsWith(github.ref, 'refs/tags/')
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            try {
              const response = await github.rest.repos.createRelease({
                draft: true,
                generate_release_notes: true,
                name: process.env.RELEASE_TAG,
                owner: context.repo.owner,
                prerelease: false,
                repo: context.repo.repo,
                tag_name: process.env.RELEASE_TAG,
              });

              return response.data.id;
            } catch (error) {
              core.setFailed(error.message);
            }

  build-binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Set tray: false on any row to quickly disable that platform's
          # GUI tray build while still producing the core adder binary.
          # macOS .pkg builds inline on a native runner per arch (arm64 on
          # macos-15, amd64 on macos-15-intel), not a separate download-artifacts
          # job: adder-tray needs CGO (Fyne) and can't be cross-compiled, so it
          # must build on its target arch. build-pkg.sh builds + signs + notarizes.
          - runner: macos-15
            os: darwin
            arch: arm64
            tray: true
          - runner: macos-15-intel
            os: darwin
            arch: amd64
            tray: true
          - runner: ubuntu-latest
            os: freebsd
            arch: amd64
            tray: true
          - runner: ubuntu-latest
            os: freebsd
            arch: arm64
            tray: true
          - runner: ubuntu-latest
            os: linux
            arch: amd64
            tray: true
          - runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            tray: true
          - runner: windows-latest
            os: windows
            arch: amd64
            tray: true
          - runner: windows-11-arm
            os: windows
            arch: arm64
            tray: true
    runs-on: ${{ matrix.runner }}
    needs: [create-draft-release]
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      id-token: write
      packages: write
      statuses: write
    steps:
      - name: Set RELEASE_TAG (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $tagName = $env:GITHUB_REF -replace 'refs/tags/', ''
          echo "RELEASE_TAG=$tagName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Set RELEASE_TAG
        if: matrix.os != 'windows'
        run: "echo \"RELEASE_TAG=${GITHUB_REF#refs/tags/}\" >> $GITHUB_ENV"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 https://github.com/actions/setup-go/releases/tag/v6.4.0
        with:
          go-version: 1.26.x
      - name: Set up MSYS2 MinGW64 for Windows amd64 CGO
        if: matrix.os == 'windows' && matrix.arch == 'amd64' && matrix.tray
        id: msys2-amd64
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Set up MSYS2 clangarm64 for Windows arm64 CGO
        if: matrix.os == 'windows' && matrix.arch == 'arm64' && matrix.tray
        id: msys2-arm64
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            mingw-w64-clang-aarch64-clang

      - name: Install Linux dependencies
        if: matrix.os == 'linux' && matrix.tray
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev

      - name: Install FreeBSD tray build toolchain
        if: matrix.os == 'freebsd' && matrix.tray
        run: |
          go install github.com/fyne-io/fyne-cross@v1.6.2

      - name: Build binary (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $env:GOOS = "${{ matrix.os }}"
          $env:GOARCH = "${{ matrix.arch }}"

          if ("${{ matrix.arch }}" -eq "amd64") {
            $msys2Loc = "${{ steps.msys2-amd64.outputs.msys2-location }}"
            $env:CC = "$msys2Loc\mingw64\bin\gcc.exe"
            $env:CXX = "$msys2Loc\mingw64\bin\g++.exe"

            go env GOOS GOARCH CC CXX
            & $env:CC --version
          }

          if ("${{ matrix.arch }}" -eq "arm64") {
            $msys2Loc = "${{ steps.msys2-arm64.outputs.msys2-location }}"
            $env:CC = "$msys2Loc\clangarm64\bin\clang.exe"
            $env:CXX = "$msys2Loc\clangarm64\bin\clang++.exe"

            go env GOOS GOARCH CC CXX
            & $env:CC --version
          }

          make build
          if ("${{ matrix.tray }}" -eq "true") {
            make build-tray
          }
      - name: Build binary
        if: matrix.os != 'windows' && matrix.os != 'darwin'
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} make build
          if [ "${{ matrix.tray }}" = "true" ]; then
            if [ "${{ matrix.os }}" = "freebsd" ]; then
              "$(go env GOPATH)/bin/fyne-cross" freebsd -arch=${{ matrix.arch }} -name adder-tray -icon .github/assets/adder-logo-with-buffer.png -env GOTOOLCHAIN=auto ./cmd/adder-tray
            else
              GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} make build-tray
            fi
          fi

      # Sign Windows build
      - name: Set up Java
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0 https://github.com/actions/setup-java/releases/tag/v5.3.0
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows' }}
        with:
          java-version: 21
          distribution: 'temurin'
      - id: 'auth'
        name: Authenticate with Google Cloud
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows' }}
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0 https://github.com/google-github-actions/auth/releases/tag/v3.0.0
        with:
          credentials_json: '${{ secrets.CERTIFICATE_SA_CREDENTIALS }}'
      - name: Set up Cloud SDK
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows' }}
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1 https://github.com/google-github-actions/setup-gcloud/releases/tag/v3.0.1
      - name: Sign binary (Windows)
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows' }}
        shell: pwsh
        run: |
          Write-Host "Downloading jsign.jar"
          Invoke-WebRequest -Uri "https://github.com/ebourg/jsign/releases/download/6.0/jsign-6.0.jar" -OutFile "jsign.jar"

          Write-Host "Verifying jsign.jar checksum"
          $expectedHash = "05ca18d4ab7b8c2183289b5378d32860f0ea0f3bdab1f1b8cae5894fb225fa8a"
          $actualHash = (Get-FileHash -Path "jsign.jar" -Algorithm SHA256).Hash.ToLower()

          if ($actualHash -ne $expectedHash) {
            Write-Error "Hash verification failed for jsign.jar"
            Write-Error "Expected: $expectedHash"
            Write-Error "Actual: $actualHash"
            exit 1
          }

          [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String("${{ secrets.CERTIFICATE_CHAIN }}")) | Out-File -FilePath "codesign-chain.pem" -Encoding utf8

          $filename = "${{ env.APPLICATION_NAME }}.exe"
          $ACCESS_TOKEN = & gcloud auth print-access-token
          Write-Host "::add-mask::$ACCESS_TOKEN"

          java -jar jsign.jar `
            --storetype ${{ secrets.CERTIFICATE_STORE_TYPE }} `
            --storepass "$ACCESS_TOKEN" `
            --keystore ${{ secrets.CERTIFICATE_KEYSTORE }} `
            --alias ${{ secrets.CERTIFICATE_KEY_NAME }} `
            --certfile "codesign-chain.pem" `
            --tsmode RFC3161 `
            --tsaurl "http://timestamp.globalsign.com/tsa/r6advanced1" `
            $filename

          $ACCESS_TOKEN = $null

          Write-Host "Signed Windows binary: $filename"
          Write-Host "Cleaning up certificate chain"
          Remove-Item -Path "codesign-chain.pem" -Force

      # Build macOS .pkg installer
      #
      # On tag pushes: import both Developer ID certs, store notarytool creds,
      # then run build-pkg.sh which produces a signed + notarized + stapled
      # .pkg under dist/. On non-tag pushes: run build-pkg.sh unsigned to
      # validate the packaging path on every push.
      - name: Build macOS .pkg
        if: matrix.os == 'darwin'
        env:
          IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/') }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [ "${IS_RELEASE}" = "true" ]; then
            echo "::group::Import Apple Developer ID certificates"
            echo -n "${APPLE_CERTIFICATE}"           | base64 --decode -o apple_app.p12
            echo -n "${APPLE_INSTALLER_CERTIFICATE}" | base64 --decode -o apple_installer.p12

            security create-keychain  -p "${APPLE_KEYCHAIN_PASSWORD}" build.keychain
            security default-keychain -s build.keychain
            security set-keychain-settings -lut 21600 build.keychain
            security unlock-keychain  -p "${APPLE_KEYCHAIN_PASSWORD}" build.keychain

            # Application cert signs binaries / .app; installer cert signs the pkg.
            security import apple_app.p12       -k build.keychain -P "${APPLE_CERTIFICATE_PASSWORD}"           -T /usr/bin/codesign
            security import apple_installer.p12 -k build.keychain -P "${APPLE_INSTALLER_CERTIFICATE_PASSWORD}" -T /usr/bin/productsign
            security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: -s -k "${APPLE_KEYCHAIN_PASSWORD}" build.keychain

            rm -f apple_app.p12 apple_installer.p12
            echo "::endgroup::"

            echo "::group::Store notarytool credentials"
            xcrun notarytool store-credentials "adder-notary" \
              --apple-id "${APPLE_ID}" \
              --team-id  "${APPLE_TEAM_ID}" \
              --password "${APPLE_APP_SPECIFIC_PASSWORD}"
            echo "::endgroup::"

            export SIGNING_IDENTITY="Developer ID Application: Blink Labs Software (${APPLE_TEAM_ID})"
            export INSTALLER_IDENTITY="Developer ID Installer: Blink Labs Software (${APPLE_TEAM_ID})"
            export TEAM_ID="${APPLE_TEAM_ID}"
            export NOTARY_PROFILE="adder-notary"
            export VERSION="${RELEASE_TAG#v}"
          fi

          export ARCH="${{ matrix.arch }}"
          ./packaging/macos/build-pkg.sh

          if [ "${IS_RELEASE}" = "true" ]; then
            echo "::group::Verify pkg with spctl (must be accepted + Notarized Developer ID)"
            PKG_PATH="dist/${APPLICATION_NAME}-${VERSION}-darwin-${{ matrix.arch }}.pkg"
            spctl_out=$(spctl -a -vv --type install "${PKG_PATH}" 2>&1)
            echo "${spctl_out}"
            echo "${spctl_out}" | grep -q 'accepted'
            echo "${spctl_out}" | grep -q 'Notarized Developer ID'
            echo "::endgroup::"
          fi

      - name: Upload release asset (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows'
        shell: pwsh
        run: |
          $filename = "${{ env.APPLICATION_NAME }}-${{ env.RELEASE_TAG }}-${{ matrix.os }}-${{ matrix.arch }}.zip"
          Compress-Archive "${{ env.APPLICATION_NAME }}.exe" "$filename"
          Write-Host "Uploading file: $filename"
          # Upload file using PowerShell
          $headers = @{
            "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}"
            "Content-Type" = "application/octet-stream"
          }
          $uploadUrl = "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ needs.create-draft-release.outputs.RELEASE_ID }}/assets?name=$filename"
          Invoke-RestMethod -Uri $uploadUrl -Method Post -Headers $headers -InFile $filename

      - name: Upload release asset (macOS pkg)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'darwin'
        run: |
          set -euo pipefail
          _version="${RELEASE_TAG#v}"
          _filename="${APPLICATION_NAME}-${_version}-${{ matrix.os }}-${{ matrix.arch }}.pkg"
          _path="dist/${_filename}"
          curl --fail --show-error --silent \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${_path}" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ needs.create-draft-release.outputs.RELEASE_ID }}/assets?name=${_filename}"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/') && matrix.os != 'windows' && matrix.os != 'darwin'
        run: |
          set -euo pipefail
          # Build from runtime env (not GitHub expression expansion) so a
          # crafted tag name can't inject shell; quote all paths.
          _filename="${APPLICATION_NAME}-${RELEASE_TAG}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tar czf "${_filename}" "${APPLICATION_NAME}"
          curl --fail --show-error --silent \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @"${_filename}" \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/${{ needs.create-draft-release.outputs.RELEASE_ID }}/assets?name=${_filename}"

      - name: Attest binary (Windows)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'windows'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1 https://github.com/actions/attest/releases/tag/v4.1.1
        with:
          subject-path: '${{ env.APPLICATION_NAME }}.exe'

      - name: Attest pkg (macOS)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'darwin'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1 https://github.com/actions/attest/releases/tag/v4.1.1
        with:
          subject-path: 'dist/*.pkg'

      - name: Attest binary
        if: startsWith(github.ref, 'refs/tags/') && matrix.os != 'windows' && matrix.os != 'darwin'
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1 https://github.com/actions/attest/releases/tag/v4.1.1
        with:
          subject-path: '${{ env.APPLICATION_NAME }}'

  build-images:
    needs: [create-draft-release]
    permissions:
      actions: write
      attestations: write
      checks: write
      contents: write
      id-token: write
      packages: write
      statuses: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - run: "echo \"RELEASE_TAG=${GITHUB_REF#refs/tags/}\" >> $GITHUB_ENV"
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: blinklabs
          password: ${{ secrets.DOCKER_PASSWORD }} # uses token
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: |
            blinklabs/adder
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
            suffix=-${{ matrix.arch }}
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: Build images
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0 https://github.com/docker/build-push-action/releases/tag/v7.2.0
        with:
          outputs: "type=registry,push=true"
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Attest Docker Hub image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1 https://github.com/actions/attest/releases/tag/v4.1.1
        with:
          subject-name: index.docker.io/blinklabs/adder
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Attest GHCR image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1 https://github.com/actions/attest/releases/tag/v4.1.1
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  build-image-manifest:
    needs: [build-images]
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: blinklabs
          password: ${{ secrets.DOCKER_PASSWORD }} # uses token
      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0 https://github.com/docker/login-action/releases/tag/v4.2.0
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io
      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: |
            blinklabs/adder
            ghcr.io/${{ github.repository }}
          flavor: |
            latest=false
          tags: |
            # Only version, no revision
            type=match,pattern=v(.*)-(.*),group=1
            # branch
            type=ref,event=branch
            # semver
            type=semver,pattern={{version}}
      - name: manifest-create
        shell: bash
        run: |
          for t in `echo '${{ steps.meta.outputs.tags }}'`; do
            # Extract the underlying manifests from each manifests list and create a new single manifest list
            docker manifest create ${t} \
              $(docker manifest inspect ${t}-amd64 | jq -r '.manifests[] | .digest' | sed -e "s|^|${t%:*}@|") \
              $(docker manifest inspect ${t}-arm64 | jq -r '.manifests[] | .digest' | sed -e "s|^|${t%:*}@|")
            docker manifest push ${t}
          done
      # Checkout repo so README.md is available for next step
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
      # Update Docker Hub from README
      - name: Docker Hub Description
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5.0.0 https://github.com/peter-evans/dockerhub-description/releases/tag/v5.0.0
        with:
          username: blinklabs
          password: ${{ secrets.DOCKER_PASSWORD }}
          repository: blinklabs/adder
          readme-filepath: ./README.md
          short-description: "Adder is a tool for tailing the Cardano blockchain and emitting events"

  finalize-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [create-draft-release, build-binaries, build-images, build-image-manifest]
    if: always() && startsWith(github.ref, 'refs/tags/') && needs.create-draft-release.result == 'success'
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0 https://github.com/actions/github-script/releases/tag/v9.0.0
        if: startsWith(github.ref, 'refs/tags/')
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: ${{ needs.create-draft-release.outputs.RELEASE_ID }},
                draft: false,
              });
            } catch (error) {
              core.setFailed(error.message);
            }
      # This updates the documentation on pkg.go.dev and the latest version available via the Go module proxy
      - name: Pull new module version
        if: startsWith(github.ref, 'refs/tags/')
        uses: andrewslotin/go-proxy-pull-action@00af8a5a49c844d6dde0bbbc116b72d8fd7ae97c # v1.5.0 https://github.com/andrewslotin/go-proxy-pull-action/releases/tag/v1.5.0
